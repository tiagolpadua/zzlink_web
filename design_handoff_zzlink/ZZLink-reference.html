document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ap;\">\n            <span style=\"font-size:18px;\">{{ flag }}<\u002Fspan>\n            <span>+{{ dial }}<\u002Fspan>\n            <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 9l6 6 6-6\" stroke=\"#7A887F\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n          <sc-if value=\"{{ countryOpen }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:absolute;top:60px;left:0;width:230px;max-height:260px;overflow:auto;background:#fff;border:1px solid #E6EAE4;border-radius:14px;box-shadow:0 18px 44px -16px rgba(16,30,24,.3);z-index:30;padding:6px;animation:zzPop .16s ease;\" class=\"zz-scroll\">\n              <sc-for list=\"{{ countries }}\" as=\"co\" hint-placeholder-count=\"4\">\n                <button type=\"button\" onclick=\"{{ co.onSelect }}\" style=\"width:100%;display:flex;align-items:center;gap:10px;padding:10px 11px;border:none;background:none;border-radius:9px;cursor:pointer;font-size:14px;font-weight:500;color:#27332D;text-align:left;\" style-hover=\"background:#F2F6F1;\">\n                  <span style=\"font-size:18px;\">{{ co.flag }}<\u002Fspan>\n                  <span style=\"flex:1;\">{{ co.name }}<\u002Fspan>\n                  <span style=\"color:#8A968E;font-weight:600;\">+{{ co.dial }}<\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <div style=\"position:relative;flex:1;\">\n          <input type=\"tel\" value=\"{{ phoneDisplay }}\" onchange=\"{{ onPhoneInput }}\" onkeydown=\"{{ onKey }}\" placeholder=\"{{ phonePlaceholder }}\" style=\"width:100%;height:54px;padding:0 42px 0 16px;font-size:17px;font-weight:600;color:#0F1E18;background:#fff;border:1.5px solid #E1E7E0;border-radius:13px;outline:none;letter-spacing:.2px;\" style-focus=\"border-color:#13A06E;box-shadow:0 0 0 4px rgba(19,160,110,.13)\">\n          <sc-if value=\"{{ hasPhone }}\" hint-placeholder-val=\"{{ false }}\">\n            <button type=\"button\" onclick=\"{{ clearInput }}\" aria-label=\"Limpar\" style=\"position:absolute;right:8px;top:50%;transform:translateY(-50%);width:28px;height:28px;border:none;background:#F0F2EF;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#7A887F;\" style-hover=\"background:#E6E9E4;color:#3C4B43\">\n              <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 6l12 12M18 6L6 18\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ hasError }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;align-items:center;gap:7px;margin-top:10px;color:#D02B2B;font-size:13.5px;font-weight:500;animation:zzFade .2s ease;\">\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\"><circle cx=\"12\" cy=\"12\" r=\"9\" stroke=\"currentColor\" stroke-width=\"1.8\"><\u002Fcircle><path d=\"M12 7.5v5.2M12 16h.01\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          <span>{{ error }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <button type=\"button\" onclick=\"{{ toggleMessage }}\" style=\"margin-top:14px;display:inline-flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;font-size:13.5px;font-weight:600;color:#0B6B4A;padding:2px 0;\">\n        <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 5v14M5 12h14\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n        <span>{{ messageToggleLabel }}<\u002Fspan>\n      <\u002Fbutton>\n\n      <sc-if value=\"{{ showMessage }}\" hint-placeholder-val=\"{{ false }}\">\n        <textarea value=\"{{ message }}\" onchange=\"{{ onMessage }}\" rows=\"3\" placeholder=\"Olá! Vi seu contato e gostaria de falar com você.\" style=\"margin-top:10px;width:100%;padding:13px 15px;font-size:14.5px;line-height:1.5;color:#0F1E18;background:#FAFBFA;border:1.5px solid #E1E7E0;border-radius:13px;outline:none;animation:zzPop .18s ease;\" style-focus=\"border-color:#13A06E;box-shadow:0 0 0 4px rgba(19,160,110,.13)\"><\u002Ftextarea>\n      <\u002Fsc-if>\n\n      <button type=\"button\" onclick=\"{{ generate }}\" style=\"margin-top:22px;width:100%;height:54px;border:none;border-radius:14px;cursor:pointer;background:linear-gradient(160deg,#15A371,#0C7A52);color:#fff;font-size:16px;font-weight:700;letter-spacing:.2px;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 10px 22px -10px rgba(12,122,82,.7);\" style-hover=\"filter:brightness(1.05)\" style-active=\"transform:translateY(1px)\">\n        <svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M9 17l-4-4 4-4M15 7l4 4-4 4M13.5 5l-3 14\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        Gerar link\n      <\u002Fbutton>\n\n      <sc-if value=\"{{ hasResult }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:24px;background:linear-gradient(180deg,#F0FAF4,#EAF7EF);border:1.5px solid #CDEBDB;border-radius:18px;padding:20px;animation:zzPop .25s cubic-bezier(.2,.8,.2,1);\">\n          <div style=\"display:flex;align-items:center;gap:7px;margin-bottom:11px;\">\n            <span style=\"width:7px;height:7px;border-radius:50%;background:#16A36F;box-shadow:0 0 0 4px rgba(22,163,111,.18);\"><\u002Fspan>\n            <span style=\"font-size:11.5px;font-weight:700;letter-spacing:1px;color:#0B6B4A;text-transform:uppercase;\">Seu link está pronto<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #D7EBDF;border-radius:12px;padding:5px 6px 5px 15px;\">\n            <a href=\"{{ resultLink }}\" target=\"_blank\" style=\"flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14.5px;font-weight:600;color:#0C7A52;text-decoration:none;\">{{ resultLink }}<\u002Fa>\n            <button type=\"button\" onclick=\"{{ copyResult }}\" style=\"flex:none;display:flex;align-items:center;gap:6px;height:38px;padding:0 14px;border:none;border-radius:9px;cursor:pointer;background:#0E875C;color:#fff;font-size:13.5px;font-weight:700;\" style-hover=\"background:#0B6B4A\">\n              <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"9\" y=\"9\" width=\"11\" height=\"11\" rx=\"2.5\" stroke=\"#fff\" stroke-width=\"1.8\"><\u002Frect><path d=\"M5 15V6a2 2 0 0 1 2-2h8\" stroke=\"#fff\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n              {{ copyLabel }}\n            <\u002Fbutton>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px;\">\n            <button type=\"button\" onclick=\"{{ openWA }}\" style=\"height:46px;border:none;border-radius:11px;cursor:pointer;background:#16A36F;color:#fff;font-size:13.5px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:7px;\" style-hover=\"background:#0E875C\">\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 3a8.5 8.5 0 0 0-7.4 12.7L3.5 20l4.4-1.1A8.5 8.5 0 1 0 12 3Z\" stroke=\"#fff\" stroke-width=\"1.7\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n              Abrir\n            <\u002Fbutton>\n            <button type=\"button\" onclick=\"{{ share }}\" style=\"height:46px;border:1.5px solid #CDE3D5;border-radius:11px;cursor:pointer;background:#fff;color:#0B6B4A;font-size:13.5px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:7px;\" style-hover=\"background:#F2FAF5;border-color:#16A36F\">\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M16 7a3 3 0 1 0-2.8-4M16 17a3 3 0 1 0 .2 .02M8 12a3 3 0 1 0-3 3M10.5 10.6l3 -2M10.5 13.4l3 2\" stroke=\"#0B6B4A\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n              Compartilhar\n            <\u002Fbutton>\n            <button type=\"button\" onclick=\"{{ openQR }}\" style=\"height:46px;border:1.5px solid #CDE3D5;border-radius:11px;cursor:pointer;background:#fff;color:#0B6B4A;font-size:13.5px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:7px;\" style-hover=\"background:#F2FAF5;border-color:#16A36F\">\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"3.5\" y=\"3.5\" width=\"7\" height=\"7\" rx=\"1.5\" stroke=\"#0B6B4A\" stroke-width=\"1.7\"><\u002Frect><rect x=\"3.5\" y=\"13.5\" width=\"7\" height=\"7\" rx=\"1.5\" stroke=\"#0B6B4A\" stroke-width=\"1.7\"><\u002Frect><rect x=\"13.5\" y=\"3.5\" width=\"7\" height=\"7\" rx=\"1.5\" stroke=\"#0B6B4A\" stroke-width=\"1.7\"><\u002Frect><path d=\"M14 14h3v3M20 14v6M14 20h3\" stroke=\"#0B6B4A\" stroke-width=\"1.7\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n              QR Code\n            <\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsection>\n\n    <!-- HISTORY -->\n    <aside style=\"flex:1 1 280px;min-width:280px;background:#fff;border:1px solid #E6EAE4;border-radius:22px;padding:24px;box-shadow:0 1px 2px rgba(16,30,24,.04),0 18px 40px -28px rgba(16,30,24,.22);\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;\">\n        <h2 style=\"font-family:'Space Grotesk';font-weight:600;font-size:16px;margin:0;color:#0F1E18;\">Links recentes<\u002Fh2>\n        <sc-if value=\"{{ hasHistory }}\" hint-placeholder-val=\"{{ false }}\">\n          <button type=\"button\" onclick=\"{{ clearHistory }}\" style=\"background:none;border:none;cursor:pointer;font-size:12.5px;font-weight:600;color:#9AA7A0;padding:2px 0;\" style-hover=\"color:#D02B2B\">Limpar<\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ hasHistory }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;flex-direction:column;gap:9px;max-height:440px;overflow:auto;\" class=\"zz-scroll\">\n          <sc-for list=\"{{ history }}\" as=\"h\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;align-items:center;gap:11px;padding:11px;border:1px solid #ECEFEA;border-radius:13px;background:#FCFDFC;\" style-hover=\"border-color:#D7EBDF;background:#F8FBF8\">\n              <div style=\"width:34px;height:34px;flex:none;border-radius:9px;background:#EAF7EF;display:flex;align-items:center;justify-content:center;\">\n                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M9 15l6-6M10 7l1-1a3.5 3.5 0 0 1 5 5l-1 1M14 17l-1 1a3.5 3.5 0 0 1-5-5l1-1\" stroke=\"#0E875C\" stroke-width=\"1.7\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <div style=\"flex:1;min-width:0;\">\n                <div style=\"font-size:13.5px;font-weight:700;color:#1B2A23;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ h.display }}<\u002Fdiv>\n                <div style=\"font-size:11.5px;color:#9AA7A0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ h.short }} · {{ h.rel }}<\u002Fdiv>\n              <\u002Fdiv>\n              <button type=\"button\" onclick=\"{{ h.onCopy }}\" aria-label=\"Copiar\" style=\"flex:none;width:30px;height:30px;border:none;background:#F0F2EF;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#5C6B62;\" style-hover=\"background:#E1F2E8;color:#0B6B4A\">\n                <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"9\" y=\"9\" width=\"11\" height=\"11\" rx=\"2.5\" stroke=\"currentColor\" stroke-width=\"1.8\"><\u002Frect><path d=\"M5 15V6a2 2 0 0 1 2-2h8\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n              <button type=\"button\" onclick=\"{{ h.onDel }}\" aria-label=\"Excluir\" style=\"flex:none;width:30px;height:30px;border:none;background:#F0F2EF;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#5C6B62;\" style-hover=\"background:#FCE9E9;color:#D02B2B\">\n                <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 7h14M9.5 7V5.5h5V7M7 7l.8 12.2a1 1 0 0 0 1 .8h6.4a1 1 0 0 0 1-.8L17 7\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ noHistory }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;padding:36px 16px;\">\n          <div style=\"width:54px;height:54px;border-radius:15px;background:#F2F6F1;display:flex;align-items:center;justify-content:center;margin-bottom:14px;\">\n            <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M9 15l6-6M10 7l1-1a3.5 3.5 0 0 1 5 5l-1 1M14 17l-1 1a3.5 3.5 0 0 1-5-5l1-1\" stroke=\"#A9B6AD\" stroke-width=\"1.7\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"font-size:14px;font-weight:600;color:#3C4B43;margin-bottom:4px;\">Nenhum link ainda<\u002Fdiv>\n          <div style=\"font-size:13px;color:#9AA7A0;line-height:1.5;\">Os links que você gerar aparecem aqui.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Faside>\n  <\u002Fmain>\n\n  <!-- QR MODAL -->\n  <sc-if value=\"{{ qrOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeQR }}\" style=\"position:fixed;inset:0;z-index:50;background:rgba(15,30,24,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:24px;animation:zzFade .18s ease;\">\n      <div onclick=\"{{ stop }}\" style=\"width:340px;max-width:100%;background:#fff;border-radius:22px;padding:26px;text-align:center;box-shadow:0 30px 70px -20px rgba(0,0,0,.5);animation:zzModal .24s cubic-bezier(.2,.8,.2,1);\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;\">\n          <h3 style=\"font-family:'Space Grotesk';font-weight:600;font-size:17px;margin:0;color:#0F1E18;\">QR Code<\u002Fh3>\n          <button type=\"button\" onclick=\"{{ closeQR }}\" style=\"width:32px;height:32px;border:none;background:#F0F2EF;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#5C6B62;\" style-hover=\"background:#E6E9E4\">\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 6l12 12M18 6L6 18\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1.5px solid #ECEFEA;border-radius:18px;padding:18px;display:inline-flex;margin-bottom:16px;\">\n          <canvas ref=\"{{ setQr }}\" width=\"240\" height=\"240\" style=\"display:block;width:240px;height:240px;\"><\u002Fcanvas>\n        <\u002Fdiv>\n        <div style=\"font-size:13.5px;font-weight:600;color:#3C4B43;margin-bottom:18px;\">{{ resultDisplay }}<\u002Fdiv>\n        <button type=\"button\" onclick=\"{{ downloadQR }}\" style=\"width:100%;height:48px;border:none;border-radius:13px;cursor:pointer;background:linear-gradient(160deg,#15A371,#0C7A52);color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 10px 22px -12px rgba(12,122,82,.7);\" style-hover=\"filter:brightness(1.05)\">\n          <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 4v10m0 0l-4-4m4 4l4-4M5 19h14\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n          Baixar PNG\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    countries: [\n      { code:'BR', name:'Brasil', dial:'55', flag:'🇧🇷' },\n      { code:'US', name:'Estados Unidos', dial:'1', flag:'🇺🇸' },\n      { code:'PT', name:'Portugal', dial:'351', flag:'🇵🇹' },\n      { code:'AR', name:'Argentina', dial:'54', flag:'🇦🇷' },\n      { code:'MX', name:'México', dial:'52', flag:'🇲🇽' },\n      { code:'ES', name:'Espanha', dial:'34', flag:'🇪🇸' },\n      { code:'CO', name:'Colômbia', dial:'57', flag:'🇨🇴' },\n      { code:'GB', name:'Reino Unido', dial:'44', flag:'🇬🇧' },\n    ],\n    countryIdx: 0,\n    countryOpen: false,\n    phoneDigits: '',\n    message: '',\n    showMessage: false,\n    result: null,\n    error: '',\n    copied: false,\n    qrOpen: false,\n    history: [],\n  };\n\n  componentDidMount() {\n    try {\n      const h = JSON.parse(localStorage.getItem('zzlink_history') || '[]');\n      if (Array.isArray(h)) this.setState({ history: h });\n    } catch (e) {}\n    document.addEventListener('keydown', this.onEsc);\n  }\n  componentWillUnmount() { document.removeEventListener('keydown', this.onEsc); }\n  componentDidUpdate() { if (this.state.qrOpen) this.drawQR(); }\n\n  onEsc = (e) => { if (e.key === 'Escape') this.setState({ qrOpen:false, countryOpen:false }); };\n\n  get country() { return this.state.countries[this.state.countryIdx]; }\n\n  formatBR(d) {\n    d = d.slice(0, 11);\n    if (!d) return '';\n    if (d.length <= 2) return '(' + d;\n    const rest = d.slice(2);\n    let mid;\n    if (rest.length <= 4) mid = rest;\n    else if (d.length <= 10) mid = rest.slice(0, 4) + '-' + rest.slice(4);\n    else mid = rest.slice(0, 5) + '-' + rest.slice(5);\n    return '(' + d.slice(0, 2) + ') ' + mid;\n  }\n  formatPhone(d) {\n    if (this.country.code === 'BR') return this.formatBR(d);\n    return d.replace(/(\\d{3})(?=\\d)/g, '$1 ').trim();\n  }\n\n  onPhoneInput = (e) => {\n    const max = this.country.code === 'BR' ? 11 : 15;\n    const d = e.target.value.replace(/\\D/g, '').slice(0, max);\n    this.setState({ phoneDigits: d, error: '' });\n  };\n  onKey = (e) => { if (e.key === 'Enter') { e.preventDefault(); this.generate(); } };\n  toggleCountry = () => this.setState(s => ({ countryOpen: !s.countryOpen }));\n  selectCountry = (i) => this.setState({ countryIdx: i, countryOpen: false, phoneDigits: '', result: null, error: '' });\n  toggleMessage = () => this.setState(s => ({ showMessage: !s.showMessage }));\n  onMessage = (e) => this.setState({ message: e.target.value });\n  clearInput = () => this.setState({ phoneDigits: '', result: null, error: '', message: '', showMessage: false });\n  stop = (e) => { if (e && e.stopPropagation) e.stopPropagation(); };\n\n  generate = () => {\n    const d = this.state.phoneDigits;\n    const min = this.country.code === 'BR' ? 10 : 7;\n    if (d.length < min) {\n      this.setState({ error: 'Número incompleto. Confira o DDD e o número.', result: null });\n      return;\n    }\n    const e164 = this.country.dial + d;\n    let link = 'https://wa.me/' + e164;\n    const msg = this.state.message.trim();\n    if (msg) link += '?text=' + encodeURIComponent(msg);\n    const display = '+' + this.country.dial + ' ' + this.formatPhone(d);\n    const result = { link, e164, display };\n    const item = { id: Date.now() + '', link, display, ts: Date.now() };\n    const history = [item, ...this.state.history.filter(h => h.link !== link)].slice(0, 20);\n    try { localStorage.setItem('zzlink_history', JSON.stringify(history)); } catch (e) {}\n    this.setState({ result, error: '', history, copied: false });\n    this._qrDone = false;\n  };\n\n  copy = (text) => {\n    try {\n      if (navigator.clipboard) navigator.clipboard.writeText(text);\n      else { const t = document.createElement('textarea'); t.value = text; document.body.appendChild(t); t.select(); document.execCommand('copy'); t.remove(); }\n    } catch (e) {}\n    this.setState({ copied: true });\n    clearTimeout(this._ct);\n    this._ct = setTimeout(() => this.setState({ copied: false }), 1600);\n  };\n  copyResult = () => { if (this.state.result) this.copy(this.state.result.link); };\n  openWA = () => { if (this.state.result) window.open(this.state.result.link, '_blank'); };\n  share = async () => {\n    const r = this.state.result; if (!r) return;\n    if (navigator.share) { try { await navigator.share({ title: 'Link do WhatsApp', url: r.link }); } catch (e) {} }\n    else this.copy(r.link);\n  };\n  openQR = () => { this._qrDone = false; this.setState({ qrOpen: true }); };\n  closeQR = () => this.setState({ qrOpen: false });\n\n  setQr = (el) => { this.qrCanvas = el; if (el && this.state.qrOpen) this.drawQR(); };\n  drawQR = () => {\n    const el = this.qrCanvas, r = this.state.result;\n    if (!el || !r) return;\n    if (this._qrFor === r.link && this._qrDone) return;\n    if (typeof QRious === 'undefined') { clearTimeout(this._qrt); this._qrt = setTimeout(this.drawQR, 200); return; }\n    new QRious({ element: el, value: r.link, size: 240, level: 'M', foreground: '#0F1E18', background: '#ffffff' });\n    this._qrFor = r.link; this._qrDone = true;\n  };\n  downloadQR = () => {\n    const el = this.qrCanvas; if (!el) return;\n    const a = document.createElement('a');\n    a.href = el.toDataURL('image/png');\n    a.download = 'zzlink-qr.png';\n    a.click();\n  };\n\n  clearHistory = () => { try { localStorage.setItem('zzlink_history', '[]'); } catch (e) {} this.setState({ history: [] }); };\n  delHistory = (id) => {\n    const history = this.state.history.filter(h => h.id !== id);\n    try { localStorage.setItem('zzlink_history', JSON.stringify(history)); } catch (e) {}\n    this.setState({ history });\n  };\n\n  rel(ts) {\n    const s = (Date.now() - ts) / 1000;\n    if (s < 60) return 'agora';\n    if (s < 3600) return 'há ' + Math.floor(s / 60) + ' min';\n    if (s < 86400) return 'há ' + Math.floor(s / 3600) + ' h';\n    if (s < 172800) return 'ontem';\n    return new Date(ts).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });\n  }\n\n  renderVals() {\n    const c = this.country;\n    return {\n      flag: c.flag, dial: c.dial,\n      countries: this.state.countries.map((co, i) => ({ ...co, onSelect: () => this.selectCountry(i) })),\n      countryOpen: this.state.countryOpen,\n      phoneDisplay: this.formatPhone(this.state.phoneDigits),\n      phonePlaceholder: c.code === 'BR' ? '(11) 91234-5678' : 'Número',\n      hasPhone: this.state.phoneDigits.length > 0,\n      message: this.state.message,\n      showMessage: this.state.showMessage,\n      messageToggleLabel: this.state.showMessage ? 'Remover mensagem' : 'Adicionar mensagem (opcional)',\n      hasError: !!this.state.error,\n      error: this.state.error,\n      hasResult: !!this.state.result,\n      resultLink: this.state.result ? this.state.result.link : '',\n      resultDisplay: this.state.result ? this.state.result.display : '',\n      copied: this.state.copied,\n      copyLabel: this.state.copied ? 'Copiado!' : 'Copiar',\n      qrOpen: this.state.qrOpen,\n      hasHistory: this.state.history.length > 0,\n      noHistory: this.state.history.length === 0,\n      history: this.state.history.map(h => ({\n        display: h.display,\n        short: h.link.replace('https://', '').split('?')[0],\n        rel: this.rel(h.ts),\n        onCopy: () => this.copy(h.link),\n        onDel: () => this.delHistory(h.id),\n      })),\n      toggleCountry: this.toggleCountry,\n      onPhoneInput: this.onPhoneInput,\n      onKey: this.onKey,\n      clearInput: this.clearInput,\n      toggleMessage: this.toggleMessage,\n
